<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Symposium JSON Generator</title>
        <style>
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
                background-color: #f4f4f7;
                color: #333;
                padding: 40px;
                max-width: 800px;
                margin: 0 auto;
            }
            h1 {
                color: #043927;
                font-family: serif;
                border-bottom: 2px solid #c4b581;
                padding-bottom: 10px;
            }
            .form-group {
                margin-bottom: 15px;
                display: flex;
                flex-direction: column;
            }
            label {
                font-weight: 600;
                margin-bottom: 5px;
                font-size: 14px;
            }
            input,
            textarea,
            select {
                padding: 10px;
                border: 1px solid #ccc;
                border-radius: 6px;
                font-size: 14px;
                font-family: inherit;
            }
            textarea {
                resize: vertical;
                min-height: 80px;
            }
            /* Toggle Switch Styling */
            .checkbox-wrapper {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-top: 5px;
                background: #e8f0fe;
                padding: 10px;
                border-radius: 6px;
                border: 1px solid #d2e3fc;
            }
            .checkbox-wrapper input {
                width: auto;
                cursor: pointer;
            }
            .checkbox-wrapper label {
                margin: 0;
                cursor: pointer;
                color: #1967d2;
            }

            button {
                background-color: #043927;
                color: #c4b581;
                border: none;
                padding: 12px 20px;
                font-size: 16px;
                font-weight: bold;
                border-radius: 6px;
                cursor: pointer;
                margin-top: 20px;
                transition: background-color 0.2s;
                width: 100%;
            }
            button:hover {
                background-color: #06543b;
            }
            #output-container {
                margin-top: 40px;
            }
            pre {
                background-color: #2b2b2b;
                color: #a9b7c6;
                padding: 20px;
                border-radius: 8px;
                overflow-x: auto;
                font-size: 13px;
                line-height: 1.5;
            }
            .row {
                display: flex;
                gap: 15px;
            }
            .row > .form-group {
                flex: 1;
            }
        </style>
    </head>
    <body>
        <h1>Symposium Event Parser</h1>
        <p>
            Enter your Word document data below. Dates and times will be
            automatically converted to ISO 8601 strict formatting.
        </p>

        <div id="event-form">
            <div class="row">
                <div class="form-group">
                    <label for="eventDate">Symposium Date</label>
                    <input type="date" id="eventDate" required />
                </div>
                <div class="form-group">
                    <label for="location">Location</label>
                    <input
                        type="text"
                        id="location"
                        placeholder="e.g., Foothill Suite"
                        required
                    />
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="startTime">Start Time</label>
                    <input type="time" id="startTime" required />
                </div>
                <div class="form-group">
                    <label for="endTime">End Time</label>
                    <input type="time" id="endTime" required />
                </div>
            </div>

            <div class="form-group">
                <label for="title">Event Title</label>
                <input
                    type="text"
                    id="title"
                    placeholder="e.g., Registration | Welcome"
                    required
                />
            </div>

            <div class="checkbox-wrapper">
                <input type="checkbox" id="isSpecial" />
                <label for="isSpecial"
                    >Is this a Special Session? (250th Anniversary)</label
                >
            </div>

            <div class="form-group" style="margin-top: 15px">
                <label for="shortDesc">Short Description (Optional)</label>
                <textarea
                    id="shortDesc"
                    placeholder="e.g., Greeting - Dr. Sheree L. Meyer..."
                ></textarea>
            </div>

            <div class="form-group">
                <label for="longDesc">Long Description (Optional)</label>
                <textarea
                    id="longDesc"
                    placeholder="Detailed multi-disciplinary information..."
                ></textarea>
            </div>

            <button onclick="addEvent()">Add Event to Payload</button>
        </div>

        <div id="output-container">
            <label>Generated JSON Payload</label>
            <pre id="jsonOutput">[\n\n]</pre>
        </div>

        <script>
            const events = [];

            function addEvent() {
                const date = document.getElementById("eventDate").value;
                const startTime = document.getElementById("startTime").value;
                const endTime = document.getElementById("endTime").value;
                const title = document.getElementById("title").value;
                const location = document.getElementById("location").value;
                // Descriptions are now optional
                const shortDesc = document.getElementById("shortDesc").value;
                const longDesc = document.getElementById("longDesc").value;
                const isSpecial = document.getElementById("isSpecial").checked;

                if (!date || !startTime || !endTime || !title || !location) {
                    alert("Please fill out Date, Time, Title, and Location.");
                    return;
                }

                // Construct strict ISO 8601 timestamps
                const isoStart = `${date}T${startTime}:00`;
                const isoEnd = `${date}T${endTime}:00`;

                const eventObj = {
                    title: title.trim(),
                    location: location.trim(),
                    startTime: isoStart,
                    endTime: isoEnd,
                    // Handle optional strings as null if empty
                    shortDescription:
                        shortDesc.trim() === "" ? null : shortDesc.trim(),
                    longDescription:
                        longDesc.trim() === "" ? null : longDesc.trim(),
                    isSpecial: isSpecial,
                };

                events.push(eventObj);

                document.getElementById("jsonOutput").textContent =
                    JSON.stringify(events, null, 4);

                // Clear text fields but keep date for workflow speed
                document.getElementById("title").value = "";
                document.getElementById("shortDesc").value = "";
                document.getElementById("longDesc").value = "";
                document.getElementById("startTime").value = "";
                document.getElementById("endTime").value = "";
                document.getElementById("isSpecial").checked = false; // Reset checkbox
                document.getElementById("title").focus();
            }
        </script>
    </body>
</html>
